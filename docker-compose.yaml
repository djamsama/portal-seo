services:
  mongo:
    image: mongo:8.0
    container_name: portal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass123
    volumes:
      - mongo_data:/data/db
    command: ["--bind_ip_all"]

volumes:
  mongo_data:
